# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Pull Request Labeler"
on:
  - pull_request

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  labeler:
    name: labeler
    permissions:
      contents: read # Required to read repository contents and configuration
      pull-requests: write # Required to apply labels to pull requests
      issues: write # Required to apply labels to issues
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/labeler@b8dd2d9be0f68b860e7dae5dae7d772984eacd6d # v6.2.0

      - name: Auto-label by Conventional Commit prefix
        if: github.event.pull_request.user.type != 'Bot'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          if   [[ "$PR_TITLE" =~ ^(feat|perf|refactor|remove|update)(\(|:) ]]; then label=enhancement
          elif [[ "$PR_TITLE" =~ ^(fix|revert)(\(|:)                       ]]; then label=bug
          elif [[ "$PR_TITLE" =~ ^docs(\(|:)                               ]]; then label=documentation
          else echo "No matching prefix in: $PR_TITLE"; exit 0
          fi
          gh pr edit "$PR_NUMBER" --add-label "$label" --repo "$GITHUB_REPOSITORY"
