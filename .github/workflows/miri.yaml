# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Miri (UB detection)

on:
  workflow_call: {}
  workflow_dispatch:

permissions: {}

concurrency:
  group: miri-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  detect-crates:
    name: Detect target crates
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read # Required to checkout crates/ directory listing
      pull-requests: read # Required to list changed files in pull request
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
          sparse-checkout: |
            crates
            .github/project-config.json
          sparse-checkout-cone-mode: false

      - name: Build crate matrix
        id: detect
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');

            // Load exclusion list from project-config.json (FFI / subprocess — not Miri-compatible)
            const config = JSON.parse(fs.readFileSync('.github/project-config.json', 'utf8'));
            const excludedCrates = new Set(config.miri_excluded_crates ?? []);

            // Dynamically scan crates/ directory
            const allCrates = fs.readdirSync('crates', { withFileTypes: true })
              .filter(d => d.isDirectory() && !excludedCrates.has(d.name))
              .map(d => d.name);

            // schedule / workflow_dispatch → all eligible crates
            const prNumber = context.payload.pull_request?.number;
            if (!prNumber) {
              core.setOutput('matrix', JSON.stringify({ crate: allCrates }));
              return;
            }

            // PR → detect which crates have .rs changes
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const filenames = files.map(f => f.filename);

            const changed = allCrates.filter(crate => {
              const prefix = `crates/${crate}/`;
              return filenames.some(f => f.startsWith(prefix) && f.endsWith('.rs'));
            });

            // Global triggers → all eligible crates
            const globalTriggers = [
              /^rust-toolchain\.toml$/,
              /^\.github\/workflows\/miri\.yaml$/,
            ];
            const globalChanged = filenames.some(f =>
              globalTriggers.some(r => r.test(f))
            );

            const targets = globalChanged ? allCrates : changed;
            core.setOutput('matrix', JSON.stringify({ crate: targets }));

  miri:
    name: Miri (${{ matrix.crate }})
    needs: detect-crates
    if: fromJSON(needs.detect-crates.outputs.matrix).crate[0] != null
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read # Required to checkout the repository
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect-crates.outputs.matrix) }}

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Install nightly toolchain with Miri
        run: |
          rustup toolchain install nightly --component miri
          rustup override set nightly

      - name: Run Miri
        env:
          MIRIFLAGS: -Zmiri-disable-isolation
          CRATE: ${{ matrix.crate }}
        run: cargo +nightly miri test -p "${CRATE}"
