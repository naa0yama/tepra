# yaml-language-server: $schema=./schema.json
upstream:
  repo: naa0yama/boilerplate-rust
  ref: main
spec:
  visibility: public
  archived: false
  features:
    issues: true
    projects: false
    wiki: false
    discussions: false
  web_commit_signoff_required: true
  merge_strategy:
    allow_merge_commit: false
    allow_squash_merge: true
    allow_rebase_merge: false
    allow_auto_merge: true
    allow_update_branch: true
    auto_delete_head_branches: true
    squash_merge_commit_title: PR_TITLE
    squash_merge_commit_message: COMMIT_MESSAGES
    merge_commit_title: MERGE_MESSAGE
    merge_commit_message: PR_TITLE
  release_immutability: true
  label_sync: mirror
  labels:
    # Defaults
    - name: bug
      description: Something isn't working
      color: d73a4a
    - name: documentation
      description: Improvements or additions to documentation
      color: 0075ca
    - name: duplicate
      description: This issue or pull request already exists
      color: cfd3d7
    - name: enhancement
      description: New feature or request
      color: a2eeef
    - name: good first issue
      description: Good for newcomers
      color: 7057ff
    - name: help wanted
      description: Extra attention is needed
      color: "008672"
    - name: invalid
      description: This doesn't seem right
      color: e4e669
    - name: question
      description: Further information is requested
      color: d876e3
    - name: wontfix
      description: This will not be worked on
      color: ffffff
    - name: security
      description: Vulnerability disclosure or security fix
      color: ee0701

    # Custom
    - name: backport
      description: Backport from template or upstream repository
      color: 0e8a16

    # release-manager
    - name: release-pr
      description: Created by release-manager for release management
      color: "5319e7"
    - name: bump:minor
      description: Bump minor version (release-manager auto-label)
      color: "5319e7"
    - name: bump:major
      description: Bump major version (release-manager auto-label)
      color: "5319e7"
    - name: ignore-for-release
      description: Exclude from release notes
      color: ededed

    # Labeler
    - name: core
      description: Changes to core application code
      color: e11d48
    - name: renovate
      description: Dependency update by Renovate
      color: 027fa0
    - name: renovate-config
      description: Changes to Renovate configuration
      color: 027fa0
    - name: github-actions
      description: Changes to GitHub Actions workflows
      color: ffd412
    - name: develop
      description: Development branch changes
      color: bfd4f2
    - name: tests
      description: Changes to test files
      color: "257759"

    # Renovate — datasource
    - name: "datasource:"
      description: "Source: unspecified"
      color: 1e7de8
    - name: datasource:crate
      description: "Source: crates.io"
      color: 1e7de8
    - name: datasource:docker
      description: "Source: Docker Hub"
      color: 1e7de8
    - name: datasource:git-refs
      description: "Source: Git refs"
      color: 1e7de8
    - name: datasource:git-tags
      description: "Source: Git tags"
      color: 1e7de8
    - name: datasource:github-releases
      description: "Source: GitHub Releases"
      color: 1e7de8
    - name: datasource:github-tags
      description: "Source: GitHub Tags"
      color: 1e7de8

    # Renovate — depType
    - name: "depType:"
      description: "Dependency type: unspecified"
      color: 28a745
    - name: depType:action
      description: "Dependency type: GitHub Actions"
      color: 28a745
    - name: depType:dockerfile-automerge
      description: "Dependency type: Dockerfile (automerge)"
      color: 28a745
    - name: depType:shell-automerge
      description: "Dependency type: shell script (automerge)"
      color: 28a745
    - name: depType:final
      description: "Dependency type: Dockerfile final stage"
      color: 28a745
    - name: depType:mise-tool
      description: "Dependency type: mise tool"
      color: 28a745
    - name: depType:stage
      description: "Dependency type: Dockerfile stage"
      color: 28a745
    - name: depType:syntax
      description: "Dependency type: Dockerfile syntax"
      color: 28a745
    - name: depType:workspace.dependencies
      description: "Dependency type: Cargo workspace"
      color: 28a745

    # Renovate — manager
    - name: "manager:"
      description: "Manager: unspecified"
      color: 8b5cf6
    - name: manager:cargo
      description: "Manager: Cargo"
      color: 8b5cf6
    - name: manager:dockerfile
      description: "Manager: Dockerfile"
      color: 8b5cf6
    - name: manager:github-actions
      description: "Manager: GitHub Actions"
      color: 8b5cf6
    - name: manager:mise
      description: "Manager: mise"
      color: 8b5cf6
    - name: manager:regex
      description: "Manager: regex"
      color: 8b5cf6
    - name: managers:dockerfile
      description: "Manager: Dockerfile (managers)"
      color: 8b5cf6

    # Renovate — update type
    - name: "update-"
      description: "Update type: unspecified"
      color: f97316
    - name: update-digest
      description: "Update type: digest"
      color: f97316
    - name: update-lockFileMaintenance
      description: "Update type: lockfile maintenance"
      color: f97316
    - name: update-major
      description: "Update type: major"
      color: f97316
    - name: update-minor
      description: "Update type: minor"
      color: f97316
    - name: update-patch
      description: "Update type: patch"
      color: f97316
    - name: update-pin
      description: "Update type: pin"
      color: f97316
    - name: update-pinDigest
      description: "Update type: pin digest"
      color: f97316

    # Renovate — versioning
    - name: "versioning:"
      description: "Versioning: unspecified"
      color: 14b8a6
    - name: versioning:cargo
      description: "Versioning: Cargo"
      color: 14b8a6
    - name: versioning:docker
      description: "Versioning: Docker"
      color: 14b8a6
    - name: versioning:git
      description: "Versioning: Git"
      color: 14b8a6
    - name: versioning:semver
      description: "Versioning: semver"
      color: 14b8a6
    - name: versioning:calver:YYYY.M.D
      description: "Versioning: calver (YYYY.M.D)"
      color: 14b8a6
    - name: versioning:github-actions
      description: "Versioning: GitHub Actions"
      color: 14b8a6
    - name: versioning:semver-coerced
      description: "Versioning: semver (coerced)"
      color: 14b8a6
    - name: versioning:semver-partial
      description: "Versioning: semver (partial)"
      color: 14b8a6

  actions:
    enabled: true
    allowed_actions: selected
    selected_actions:
      github_owned_allowed: true
      patterns_allowed:
        - "actions-rust-lang/setup-rust-toolchain@*"
        - "devcontainers/ci@*"
        - "docker/login-action@*"
        - "jdx/mise-action@*"
        - "k1low/gh-setup@*"
        - "k1low/octocov-action@*"
        - "mozilla-actions/sccache-action@*"
        - "swatinem/rust-cache@*"
        - "taiki-e/install-action@*"
        - "zizmorcore/zizmor-action@*"
    sha_pinning_required: true
    workflow_permissions: read
    can_approve_pull_requests: true
    fork_pr_approval: all_external_contributors
  rulesets:
    - name: main
      target: branch
      enforcement: active
      conditions:
        ref_name:
          include:
            - ~DEFAULT_BRANCH
      rules:
        pull_request:
          required_approving_review_count: 0
          dismiss_stale_reviews_on_push: true
          require_code_owner_review: false
          require_last_push_approval: false
          required_review_thread_resolution: true
          allowed_merge_methods:
            - squash
        required_status_checks:
          strict_required_status_checks_policy: true
          contexts:
            - context: CI Gate
              app: github-actions
            - context: CodeQL
              app: github-advanced-security
        non_fast_forward: true
        deletion: true
        creation: false
        required_linear_history: false
        required_signatures: true
    - name: badges
      target: branch
      enforcement: active
      conditions:
        ref_name:
          include:
            - refs/heads/badges
      rules:
        deletion: true
files:
  # .cargo
  - path: .cargo/config.toml
    strategy: replace

  # .claude
  - path: .claude/settings.json
    strategy: replace

  # .devcontainer
  - path: .devcontainer/devcontainer.json
    strategy: replace
  - path: .devcontainer/initializeCommand.sh
    strategy: replace
  - path: .devcontainer/o2-env.sh
    strategy: replace
  - path: .devcontainer/o2-import-dashboards.sh
    strategy: replace
  - path: .devcontainer/postStartCommand.sh
    strategy: replace
  - path: .devcontainer/traefik.sh
    strategy: delete

  # .githooks
  - path: .githooks/commit-msg
    strategy: replace
  - path: .githooks/post-checkout
    strategy: replace
  - path: .githooks/pre-commit
    strategy: replace
  - path: .githooks/pre-push
    strategy: replace

  # .github/actions/act-actionlint
  - path: .github/actions/act-actionlint/action.yaml
    strategy: replace

  # .github/actions/act-audit
  - path: .github/actions/act-audit/action.yaml
    strategy: replace

  # .github/actions/act-cleanup
  - path: .github/actions/act-cleanup/action.yaml
    strategy: replace

  # .github/actions/act-codeql
  - path: .github/actions/act-codeql/action.yaml
    strategy: replace

  # .github/actions/act-docs-ci
  - path: .github/actions/act-docs-ci/action.yaml
    strategy: replace

  # .github/actions/act-prebuild-container
  - path: .github/actions/act-prebuild-container/action.yaml
    strategy: replace

  # .github/actions/act-setup-rust
  - path: .github/actions/act-setup-rust/action.yaml
    strategy: replace

  # .github/actions/upload-release-assets
  - path: .github/actions/upload-release-assets/action.yaml
    strategy: replace

  # .github
  - path: .github/actionlint.yaml
    strategy: replace
  - path: .github/codeql-config.yml
    strategy: replace
  - path: .github/labeler.yml
    strategy: replace
  - path: .github/labels.json
    strategy: delete
  - path: .github/project-config.json
    strategy: create_only
  - path: .github/release.yml
    strategy: replace
  - path: .github/release-manager-pr-template.md
    strategy: replace
  - path: .github/tagpr-template.md
    strategy: delete

  # .github/graft
  - path: .github/graft/patches/.gitkeep
    strategy: create_only
  - path: .github/graft/config.yaml
    strategy: delete
  - path: .github/graft/schema.json
    strategy: delete

  - path: .github/gh-sync/patches/.gitkeep
    strategy: delete
  - path: .github/gh-sync/config.yaml
    strategy: delete
  - path: .github/gh-sync/schema.json
    strategy: delete

  # .github/rulesets
  - path: .github/rulesets/default_branch.json
    strategy: delete
  - path: .github/rulesets/tags.json
    strategy: delete

  # .github/infra
  - path: .github/infra/patches/.gitkeep
    strategy: delete
  - path: .github/infra/templates/File.yaml
    strategy: delete
  - path: .github/infra/templates/Repository.yaml
    strategy: delete
  - path: .github/infra/TEMPLATE.yaml
    strategy: delete

  # .github/workflows
  - path: .github/workflows/_orchestrator.yaml
    strategy: replace
  - path: .github/workflows/actionlint-format.txt
    strategy: replace
  - path: .github/workflows/cleanup.yaml
    strategy: replace
  - path: .github/workflows/miri.yaml
    strategy: replace
  - path: .github/workflows/pr-labeler.yaml
    strategy: replace
  - path: .github/workflows/actionlint.yaml
    strategy: delete
  - path: .github/workflows/audit.yaml
    strategy: delete
  - path: .github/workflows/codeql.yaml
    strategy: delete
  - path: .github/workflows/docs-ci.yaml
    strategy: delete
  - path: .github/workflows/label-sync.yaml
    strategy: delete
  - path: .github/workflows/prebuild-container.yaml
    strategy: delete
  - path: .github/workflows/release-manager.yaml
    strategy: replace
  - path: .github/workflows/release.yaml
    strategy: replace
  - path: .github/workflows/rust-ci.yaml
    strategy: replace
  - path: .github/workflows/tagpr.yaml
    strategy: delete

  # .mise
  - path: .mise/config.devcontainer.toml
    strategy: replace
  - path: .mise/config.tagpr.toml
    strategy: delete
  - path: .mise/overrides.toml
    strategy: create_only
  - path: .mise/tasks.toml
    strategy: replace
  - path: .mise/tools.optional.toml
    strategy: delete

  # .vscode
  - path: .vscode/launch.json
    strategy: replace
    preserve_markers: true
  - path: .vscode/settings.json
    strategy: replace

  # ast-rules
  - path: ast-rules/_rules.md
    strategy: replace
  - path: ast-rules/error-context-required.yml
    strategy: replace
  - path: ast-rules/module-size-limit.yml
    strategy: replace
  - path: ast-rules/no-blocking-in-async.yml
    strategy: replace
  - path: ast-rules/no-get-prefix.yml
    strategy: replace
  - path: ast-rules/no-hardcoded-credentials.yml
    strategy: replace
  - path: ast-rules/secure-random-required.yml
    strategy: replace
  - path: ast-rules/no-real-asn.yml
    strategy: replace
  - path: ast-rules/no-real-fqdn.yml
    strategy: replace
  - path: ast-rules/no-real-ipv4.yml
    strategy: replace
  - path: ast-rules/no-real-ipv6.yml
    strategy: replace

  # docs/o2-dashboards
  - path: docs/o2-dashboards/.gitkeep
    strategy: replace

  # docs/specs/components
  - path: docs/specs/components/.gitkeep
    strategy: replace

  # docs/specs/external
  - path: docs/specs/external/.gitkeep
    strategy: replace

  # tmp
  - path: tmp/.gitkeep
    strategy: replace

  # others
  - path: .clippy.toml
    strategy: replace
  - path: .dockerignore
    strategy: replace
  - path: .editorconfig
    strategy: replace
  - path: .gitignore
    strategy: replace
    preserve_markers: true
  - path: .gitleaksignore
    strategy: replace
  - path: .octocov.yml
    strategy: replace
  - path: .tagpr
    strategy: delete
  - path: .worktreeinclude
    strategy: replace
    preserve_markers: true
  - path: Cargo.toml
    strategy: replace
    preserve_markers: true
  - path: Dockerfile
    strategy: replace
    preserve_markers: true
  - path: LICENSE
    strategy: replace
  - path: deny.toml
    strategy: replace
  - path: dprint.jsonc
    strategy: replace
  - path: mise.toml
    strategy: replace
    preserve_markers: true
  - path: renovate.json
    strategy: replace
  - path: rust-toolchain.toml
    strategy: replace
    preserve_markers: true
  - path: sgconfig.yml
    strategy: replace

  # deleted
  - path: coverage.svg
    strategy: delete
  - path: mise.devcontainer.toml
    strategy: delete
  - path: mise.tagpr.toml
    strategy: delete
  - path: time.svg
    strategy: delete
