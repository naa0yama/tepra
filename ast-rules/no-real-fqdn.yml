id: no-real-fqdn
language: rust
severity: warning
message: "PTR hostname contains non-approved device or facility segment"
note: |
  Approved device names:
    rtr01 rtr02 rtr03
    edge01 edge02 edge03
    core01 core02
  Approved facility codes: dc01 dc05 pop1 pop2
  Example: xe-0-0-1.rtr01.dc01.example.net
           ge-0-0-0.edge02.pop2.example.net
rule:
  any:
    - all:
        - any:
            - kind: string_literal
            - kind: line_comment
            - kind: block_comment
        - regex: '\b(xe|ge|et|lo)-\d+-\d+-\d+\.'
        - not:
            regex: '(rtr0[1-3]|edge0[1-3]|core0[1-2])\.'
    - all:
        - any:
            - kind: string_literal
            - kind: line_comment
            - kind: block_comment
        - regex: '\b(xe|ge|et|lo)-\d+-\d+-\d+\.'
        - not:
            regex: '\.(example\.(com|net|org)|invalid)\b'
