id: no-real-ipv4
language: rust
severity: warning
message: "Real IPv4 address — use an RFC-reserved range (RFC 5737 / RFC 1918 / RFC 6598)"
note: |
  Approved ranges:
    198.51.100.0/24  RFC 5737 TEST-NET-2 (preferred)   e.g. 198.51.100.1
       192.0.2.0/24  RFC 5737 TEST-NET-1               e.g. 192.0.2.1
     203.0.113.0/24  RFC 5737 TEST-NET-3               e.g. 203.0.113.1
        10.0.0.0/8   RFC 1918 private                  e.g. 10.0.0.1
      172.16.0.0/12  RFC 1918 private                  e.g. 172.16.0.1
     192.168.0.0/16  RFC 1918 private                  e.g. 192.168.0.1
       127.0.0.0/8   loopback                          e.g. 127.0.0.1
     169.254.0.0/16  link-local (RFC 3927)             e.g. 169.254.1.1
      100.64.0.0/10  CG-NAT (RFC 6598)                 e.g. 100.64.0.1
         0.0.0.0     unspecified
       224.0.0.0+    multicast / broadcast
rule:
  all:
    - any:
        - kind: string_literal
        - kind: line_comment
        - kind: block_comment
    - regex: '\b(?:(?:25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9])\.){3}(?:25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9])(?:/\d{1,2})?\b'
    - not:
        regex: '\b(10\.|127\.|169\.254\.|172\.(1[6-9]|2\d|3[01])\.|192\.168\.|192\.0\.2\.|198\.51\.100\.|203\.0\.113\.|0\.0\.0\.0|100\.(6[4-9]|[7-9]\d|1[01]\d|12[0-7])\.|22[4-9]\.|2[3-5]\d\.)'
